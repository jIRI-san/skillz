name: registry-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  registry:
    name: registry checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          }
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer
          Invoke-ScriptAnalyzer -Path scripts/skalary -Settings PSScriptAnalyzerSettings.psd1 -Recurse

      - name: Pester
        shell: pwsh
        run: |
          Import-Module Pester
          $result = Invoke-Pester -Path tests/skalary/Skalary.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester failed with $($result.FailedCount) failing test(s)."
          }

      - name: Validate registry
        shell: pwsh
        run: pwsh -NoProfile -File scripts/skalary/Test-Registry.ps1

      - name: Dogfood drift check
        shell: pwsh
        run: pwsh -NoProfile -File scripts/skalary/Sync-Dogfood.ps1 -WhatIf

      - name: README and registry generated output is up to date
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/skalary/Build-Registry.ps1
          git diff --exit-code -- registry.json README.md
